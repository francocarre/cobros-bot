name: Cobros bot

on:
  schedule:
    # Cada 5 min. El script corre un loop interno de ~4 min poleando cada 15s,
    # entonces la latencia real es <15s salvo el gap de ~1 min entre runs.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    concurrency:
      group: cobros-bot
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Run
        run: node src/index.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_LABEL: ${{ secrets.GMAIL_LABEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit data (si hubo cambios)
        run: |
          git config user.name "cobros-bot"
          git config user.email "cobros-bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: actualizar historial"
          git push
